name: Omniverse
options:
  bundleIdPrefix: com.finix
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug
settings:
  base:
    DEVELOPMENT_TEAM: "53RF8LL39N"
    SWIFT_VERSION: "5.10"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "2.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: NO
targets:
  Omniverse:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Omniverse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.finix.omniverse
        PRODUCT_NAME: Omniverse
        INFOPLIST_FILE: Omniverse/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    info:
      path: Omniverse/Info.plist
      properties:
        CFBundleDisplayName: Omniverse
        CFBundleShortVersionString: "2.1.0"
        CFBundleVersion: "1"
        NSCameraUsageDescription: "Omniverse uses the camera to scan a Sync QR code so you can sign in across devices."
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Unlock ProMotion / max refresh rate (120Hz). Without this iOS caps
        # CADisplayLink + animations at 60Hz on ProMotion devices.
        CADisableMinimumFrameDurationOnPhone: true
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        UIRequiresFullScreen: false
        # Allow the cleartext/self-signed stream + scraper hosts the app talks to.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        # Custom URL scheme for Trakt + AniList OAuth deep links.
        CFBundleURLTypes:
          - CFBundleURLName: com.finix.omniverse.oauth
            CFBundleURLSchemes:
              - omniplay
              - omniverse
        UIBackgroundModes:
          - audio
