name: Native Enterprise Build Artifacts

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Native Android App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew

      - name: Run Kotlin Unit Tests
        run: |
          cd android
          ./gradlew testDebugUnitTest

      - name: Compile signed APK (Release)
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload Android Production APK
        uses: actions/upload-artifact@v4
        with:
          name: Omniverse-android-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

  build-ios:
    name: Build Native iOS App
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer || \
          xcode-select -p

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project via XcodeGen
        run: |
          cd ios
          xcodegen

      - name: Run Swift Unit Tests
        run: |
          xcodebuild -project ios/Omniverse.xcodeproj \
                     -scheme Omniverse \
                     -sdk iphonesimulator \
                     -destination 'platform=iOS Simulator,name=iPad mini (A17 Pro)' \
                     test

      - name: Compile and Archive Swift App Bundle (Unsigned)
        run: |
          cd ios
          xcodebuild -project Omniverse.xcodeproj \
                     -scheme Omniverse \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath build/Omniverse.xcarchive \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     clean archive

      - name: Package App Bundle into Unsigned IPA
        run: |
          mkdir -p ios/build/Payload
          cp -r ios/build/Omniverse.xcarchive/Products/Applications/Omniverse.app ios/build/Payload/
          cd ios/build
          zip -r ../../Omniverse-Unsigned.ipa Payload

      - name: Upload iOS Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Omniverse-ios-unsigned-ipa
          path: Omniverse-Unsigned.ipa
          if-no-files-found: error

  publish-release:
    name: Publish Production Release Assets
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: Omniverse-android-release-apk
          path: out_android

      - name: Download iOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: Omniverse-ios-unsigned-ipa
          path: out_ios

      - name: Package Release Assets
        run: |
          mkdir -p release_assets
          cp out_android/app-release.apk release_assets/Omniverse.apk
          cp out_ios/Omniverse-Unsigned.ipa release_assets/Omniverse-Unsigned.ipa

      - name: Get Latest Commit Message
        run: |
          echo "COMMIT_MSG<<EOF" >> $GITHUB_ENV
          git log -1 --pretty=%B >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.1.${{ github.run_number }}
          name: Omniverse v2.1.${{ github.run_number }} Release
          body: |
            ## 🚀 New Update Released!

            ### 🆕 What's New / Changes:
            ${{ env.COMMIT_MSG }}

            ---

            ### 📦 Installation Packages:
            *   🤖 **Android Devices**: Download **`Omniverse.apk`** to install directly on any Android Mobile, Tablet, or Android TV / Fire TV.
            *   🍎 **iOS/iPadOS/macOS Devices**: Download **`Omniverse-Unsigned.ipa`** to sideload or deploy on your Apple hardware.

            ### ⚡ Features Highlight:
            *   🏴‍☠️ **One Pace Integration**: Fully synchronized One Pace arcs.
            *   🌸 **AniList Integration**: Live scrobbling for all your favorite animes.
            *   🍿 **Trakt Sync**: Real-time cloud sync & watchlist manager.
          draft: false
          prerelease: false
          files: |
            release_assets/Omniverse.apk
            release_assets/Omniverse-Unsigned.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
