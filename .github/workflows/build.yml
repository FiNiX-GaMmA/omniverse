name: Native Enterprise Build Artifacts

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Native Android App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew

      - name: Run Kotlin Unit Tests
        run: |
          cd android
          ./gradlew testDebugUnitTest

      - name: Compile signed APK (Release)
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload Android Production APK
        uses: actions/upload-artifact@v4
        with:
          name: Omniverse-android-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

  build-ios:
    name: Build Native iOS App
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer || \
          xcode-select -p

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project via XcodeGen
        run: |
          cd ios
          xcodegen

      - name: Run Swift Unit Tests
        run: |
          xcodebuild -project ios/Omniverse.xcodeproj \
                     -scheme Omniverse \
                     -sdk iphonesimulator \
                     -destination 'platform=iOS Simulator,name=iPad mini (A17 Pro)' \
                     test

      - name: Compile and Archive Swift App Bundle (Unsigned)
        run: |
          cd ios
          xcodebuild -project Omniverse.xcodeproj \
                     -scheme Omniverse \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath build/Omniverse.xcarchive \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     clean archive

      - name: Package App Bundle into Unsigned IPA
        run: |
          mkdir -p ios/build/Payload
          cp -r ios/build/Omniverse.xcarchive/Products/Applications/Omniverse.app ios/build/Payload/
          cd ios/build
          zip -r ../../Omniverse-Unsigned.ipa Payload

      - name: Upload iOS Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Omniverse-ios-unsigned-ipa
          path: Omniverse-Unsigned.ipa
          if-no-files-found: error

  build-desktop:
    name: Build Desktop App (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: desktop/package.json

      - name: Install dependencies
        run: |
          cd desktop
          npm install

      - name: Package Desktop Binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd desktop
          npm run dist:win
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Desktop Binary (macOS)
        if: matrix.os == 'macos-14'
        run: |
          cd desktop
          npm run dist:mac
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Desktop Binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd desktop
          npm run dist:linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Desktop Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Omniverse-desktop-windows
          path: |
            desktop/dist/*.exe
          if-no-files-found: error

      - name: Upload Desktop Artifacts (macOS)
        if: matrix.os == 'macos-14'
        uses: actions/upload-artifact@v4
        with:
          name: Omniverse-desktop-macos
          path: |
            desktop/dist/*.dmg
          if-no-files-found: error

      - name: Upload Desktop Artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Omniverse-desktop-linux
          path: |
            desktop/dist/*.AppImage
            desktop/dist/*.deb
          if-no-files-found: error

  publish-release:
    name: Publish Production Release Assets
    needs: [build-android, build-ios, build-desktop]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: Omniverse-android-release-apk
          path: out_android

      - name: Download iOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: Omniverse-ios-unsigned-ipa
          path: out_ios

      - name: Download Windows Desktop Artifact
        uses: actions/download-artifact@v4
        with:
          name: Omniverse-desktop-windows
          path: out_win

      - name: Download macOS Desktop Artifact
        uses: actions/download-artifact@v4
        with:
          name: Omniverse-desktop-macos
          path: out_mac

      - name: Download Linux Desktop Artifact
        uses: actions/download-artifact@v4
        with:
          name: Omniverse-desktop-linux
          path: out_linux

      - name: Package Release Assets
        run: |
          mkdir -p release_assets
          cp out_android/app-release.apk release_assets/Omniverse.apk
          cp out_ios/Omniverse-Unsigned.ipa release_assets/Omniverse-Unsigned.ipa
          cp out_win/*.exe release_assets/
          cp out_mac/*.dmg release_assets/
          cp out_linux/*.AppImage release_assets/
          cp out_linux/*.deb release_assets/

      - name: Get Latest Commit Message
        run: |
          echo "COMMIT_MSG<<EOF" >> $GITHUB_ENV
          git log -1 --pretty=%B >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.1.${{ github.run_number }}
          name: Omniverse v2.1.${{ github.run_number }} Release
          body: |
            ## 🚀 New Update Released!

            ### 🆕 What's New / Changes:
            ${{ env.COMMIT_MSG }}

            ---

            ### 📦 Installation Packages:
            *   🤖 **Android Devices**: Download **`Omniverse.apk`** to install directly on any Android Mobile, Tablet, or Android TV / Fire TV.
            *   🍎 **iOS/iPadOS/macOS (Native App)**: Download **`Omniverse-Unsigned.ipa`** to sideload or deploy on your Apple hardware.
            *   💻 **Windows Devices (Desktop App)**: Download the **`.exe`** NSIS setup installer (or portable build) to install on Windows PCs.
            *   🍏 **macOS Devices (Intel & Silicon Desktop App)**: Download the **`.dmg`** to run natively on any Mac.
            *   🐧 **Linux Devices (Desktop App)**: Download the **`.AppImage`** or **`.deb`** to install on Linux distributions.

            ### ⚡ Features Highlight:
            *   🏴‍☠️ **One Pace Integration**: Fully synchronized One Pace arcs.
            *   🌸 **AniList Integration**: Live scrobbling for all your favorite animes.
            *   🍿 **Trakt Sync**: Real-time cloud sync & watchlist manager.
          draft: false
          prerelease: false
          files: |
            release_assets/Omniverse.apk
            release_assets/Omniverse-Unsigned.ipa
            release_assets/*.exe
            release_assets/*.dmg
            release_assets/*.AppImage
            release_assets/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
