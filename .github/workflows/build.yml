name: Native Enterprise Build Artifacts

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Native Android App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew

      - name: Compile signed APK (Release)
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload Android Production APK
        uses: actions/upload-artifact@v4
        with:
          name: Omniverse-android-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

  build-ios:
    name: Build Native iOS App
    runs-on: macos-13
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project via XcodeGen
        run: |
          cd ios
          xcodegen

      - name: Compile and Archive Swift App Bundle (Unsigned)
        run: |
          cd ios
          xcodebuild -project Omniverse.xcodeproj \
                     -scheme Omniverse \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath build/Omniverse.xcarchive \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     clean archive

      - name: Package App Bundle into Unsigned IPA
        run: |
          mkdir -p ios/build/Payload
          cp -r ios/build/Omniverse.xcarchive/Products/Applications/Omniverse.app ios/build/Payload/
          cd ios/build
          zip -r ../../Omniverse-Unsigned.ipa Payload

      - name: Upload iOS Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Omniverse-ios-unsigned-ipa
          path: Omniverse-Unsigned.ipa
          if-no-files-found: error
